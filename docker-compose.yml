version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
    depends_on:
      - db

  db:
    image: python:3.11-slim
    volumes:
      - db_data:/data
    command: sh -c "python3 -c 'import sqlite3; sqlite3.connect(\"/data/parad.db\")'"

volumes:
  db_data: