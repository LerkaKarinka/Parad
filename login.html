<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Парад Звёзд</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <div class="container" style="max-width: 450px; margin-top: 100px;">
            <a href="index.html" class="btn btn-outline" style="margin-bottom: 20px; display: inline-block;">← На главную</a>
            
            <div class="form-card">
                <div class="card-header" style="text-align: center;">
                    <h1 style="font-size: 2rem; margin-bottom: 10px;">🔐</h1>
                    <h2>Вход для администратора</h2>
                    <p style="color: #6b7280; font-size: 14px; margin-top: 10px;">
                        Введите логин и пароль для доступа к панели управления
                    </p>
                </div>
                <div class="card-body">
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="username">Логин</label>
                            <input type="text" id="username" placeholder="Введите логин..." required autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label for="password">Пароль</label>
                            <input type="password" id="password" placeholder="Введите пароль..." required autocomplete="current-password">
                        </div>
                        <div id="errorMessage" style="display: none; padding: 12px; background: #fee2e2; color: #b91c1c; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 0.9rem; border-left: 4px solid #ef4444;"></div>
                        <div class="form-actions" style="display: block;">
                            <button type="submit" class="btn btn-primary" style="width: 100%;">
                                Войти
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // Проверка логина и пароля
            if (username === 'admin' && password === 'anosov.museum') {
                // Сохраняем статус авторизации
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('loginTime', new Date().getTime());
                
                // Перенаправляем в админ панель
                window.location.href = 'admin-panel.html';
            } else {
                errorMessage.textContent = 'Неверный логин или пароль';
                errorMessage.style.display = 'block';
                
                // Очищаем поле пароля и фокусируемся
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
    </script>
</body>
</html>
